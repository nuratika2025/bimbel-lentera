name: Continuous Integration (HTML Lint)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  html-validation:
    name: Validate HTML Code
    runs-on: ubuntu-latest

    steps:
    # Langkah 1: Mengambil kode dari repositori GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # Langkah 2: Menggunakan Node.js untuk menjalankan linter
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Langkah 3: Menginstal dan menjalankan HTMLHint secara global lewat npm (paling aman & stabil)
    - name: Install and Run HTMLHint
      run: |
        npm install -g htmlhint
        htmlhint index.html